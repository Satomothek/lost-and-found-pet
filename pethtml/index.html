<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lost & Found Pets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo">🐾</div>
        <h2 style="margin-bottom: 25px; letter-spacing: 1px;">LOGIN</h2>
        
        <form action="found_pets.html" method="GET">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="Masukkan email...">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Masukkan Password...">
            </div>

            <button type="submit" class="btn-login">Masuk</button>
        </form>
        
        <p style="font-size: 0.8rem; margin-top: 15px;">Belum punya akun? Daftar</p>
    </div>
</body>
</html>
