<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Report - Lost & Found Pets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon"></div>
            <span>Lost & Found<br><small style="font-size:0.7em">Pets</small></span>
        </div>
        <nav>
            <ul>
                <li><a href="post_report.html" class="active">Post Report</a></li>
                <li><a href="found_pets.html">Found Pets</a></li>
                <li><a href="lost_pets.html">Lost Pets</a></li>
                <li><a href="#">Notification</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="index.html" style="color:red;">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="report-layout">
            <div class="upload-section">
                <button class="upload-btn">UPLOAD IMAGES</button>
            </div>
            <div class="form-section">
                <input type="text" class="report-input" placeholder="Name Pet">
                <input type="text" class="report-input" placeholder="Last Seen:">
                <input type="text" class="report-input" placeholder="When? : DD/MM/YY">
                <input type="text" class="report-input" placeholder="Spesies:">
                <input type="text" class="report-input" placeholder="Breed:">
                <input type="email" class="report-input" placeholder="Contact Email:">
                <input type="tel" class="report-input" placeholder="Contact Number:">
                <input type="text" class="report-input" placeholder="Circumstance:" style="height: 80px;">
            </div>
        </div>
    </main>
</body>
</html>
