<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Lost & Found Pets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon"></div>
            <span>Lost & Found<br><small style="font-size:0.7em">Pets</small></span>
        </div>
        <nav>
            <ul>
                <li><a href="post_report.html">Post Report</a></li>
                <li><a href="found_pets.html">Found Pets</a></li>
                <li><a href="#">Lost Pets</a></li>
                <li><a href="#">Notification</a></li>
                <li><a href="messages.html" class="active">Messages</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="index.html" style="color:red;">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="messages-main">
        <div class="chat-sidebar">
            <div class="chat-search">
                <input type="text" placeholder="Search chats...">
            </div>
            <div class="chat-item active">
                <div class="chat-avatar" style="background-color: #eec;"></div>
                <div>
                    <h4>Reborns Gundam</h4>
                    <p style="font-size:0.8rem; color:#888;">Online</p>
                </div>
            </div>
        </div>
        
        <div class="chat-main-area">
            <div class="chat-header">
                <strong>Reborns Gundam</strong>
                <div><span>📞</span> <span>📹</span></div>
            </div>
            <div class="chat-area">
                <div class="message received">Oh?</div>
                <div class="message received">Cool</div>
                <div class="message sent">Simple</div>
                <div class="message sent">You just edit any text...</div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-box">Type a message...</div>
            </div>
        </div>
    </main>
</body>
</html>
